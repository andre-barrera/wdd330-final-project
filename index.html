<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Hub</title>
  <link rel="stylesheet" href="/src/css/style.css">
</head>

<body>

<div id="header"></div>

<section class="hero glass">
  <div class="hero-content">
    <div class="hero-image"></div>

    <div class="hero-text">
      <h2>Discover New Games</h2>
      <p>Find the best deals, reviews, and ratings in one place.</p>
      <div class="hero-buttons">
        <button type="button">Explore</button>
        <button type="button">Top Rated</button>
      </div>
    </div>
  </div>
</section>

<section class="featured">
  <h2>Featured Games</h2>
  <div class="featured-grid"></div>
</section>

<section class="results-section">
  <h2>Search Results</h2>

  <form class="controls" id="controlsForm">
    <select id="sortSelect">
      <option value="">Sort By</option>
      <option value="rating">⭐ Rating</option>
      <option value="name">🔤 Name</option>
    </select>

    <input 
      type="text" 
      id="filterInput" 
      placeholder="Filter by name..." 
    />
  </form>

  <div id="results"></div>
</section>

<div class="favorites-link">
  <a href="/favorites/index.html">⭐ View Favorites</a>
</div>

<script type="module" src="/src/js/main.js"></script>

</body>
</html>
